<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Спасибо — Byrud Tech</title>
  <meta name="format-detection" content="telephone=no" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0b0b; --bg2: #111111; --bg3: #161616;
      --amber: #e8a220; --amber-dim: #b87e18; --amber-glow: rgba(232,162,32,0.12);
      --text: #f0ede8; --text-muted: #9a9a92; --text-dim: #6a6a64;
      --border: rgba(255,255,255,0.07); --border-amber: rgba(232,162,32,0.3);
      --r: 6px; --r-sm: 4px;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; font-weight: 400; line-height: 1.6; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; z-index: 0; opacity: 0.15; }

    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 3rem; height: 64px; background: rgba(11,11,11,0.88); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
    .logo { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 1.3rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text); text-decoration: none; position: relative; padding: 5px 8px; }
    .logo-corner { position: absolute; width: 7px; height: 7px; border-color: var(--amber); border-style: solid; border-width: 0; }
    .logo-corner--tl { top: 0; left: 0; border-top-width: 1px; border-left-width: 1px; }
    .logo-corner--tr { top: 0; right: 0; border-top-width: 1px; border-right-width: 1px; }
    .logo-corner--bl { bottom: 0; left: 0; border-bottom-width: 1px; border-left-width: 1px; }
    .logo-corner--br { bottom: 0; right: 0; border-bottom-width: 1px; border-right-width: 1px; }
    .logo span { color: var(--amber); }

    .section-tag { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 1rem; }
    .btn-primary { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; background: var(--amber); color: #0b0b0b; padding: 0.9rem 2rem; text-decoration: none; font-weight: 500; transition: opacity 0.2s; border: none; cursor: pointer; }
    .btn-primary:hover { opacity: 0.85; }

    .danke-section { min-height: calc(100vh - 64px - 60px); display: flex; align-items: center; justify-content: center; text-align: center; padding: 4rem 2rem; position: relative; z-index: 1; }
    .danke-section h1 { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: clamp(2rem, 5vw, 4rem); text-transform: uppercase; line-height: 1; margin-bottom: 0; }

    footer { border-top: 1px solid var(--border); padding: 2rem 3rem; display: flex; align-items: center; justify-content: space-between; background: var(--bg); position: relative; z-index: 1; }
    .footer-copy { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; letter-spacing: 0.1em; color: var(--text-dim); }
    .footer-links { display: flex; gap: 1.5rem; }
    .footer-links a { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); text-decoration: none; transition: color 0.2s; }
    .footer-links a:hover { color: var(--amber); }

    @media (max-width: 900px) {
      nav { padding: 0 1.5rem; }
      footer { flex-direction: column; gap: 1rem; text-align: center; padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index-ru.html" class="logo">
      <span class="logo-corner logo-corner--tl"></span>
      <span class="logo-corner logo-corner--tr"></span>
      <span class="logo-corner logo-corner--bl"></span>
      <span class="logo-corner logo-corner--br"></span>
      BYRUD<span>TECH</span>
    </a>
  </nav>

  <section class="danke-section">
    <div>
      <div class="section-tag">// Спасибо</div>
      <h1>Сообщение<br><span style="color: var(--amber);">отправлено.</span></h1>
      <p style="color: var(--text-muted); max-width: 400px; margin: 1.5rem auto 2rem; line-height: 1.75;">
        Мы получили ваш запрос и свяжемся с вами в течение 24 часов.
      </p>
      <a href="index-ru.html" class="btn-primary">&larr; На главную</a>
    </div>
  </section>

  <footer>
    <span class="footer-copy">&copy; 2025 Byrud Tech. Все права защищены.</span>
    <div class="footer-links"><a href="#">Impressum</a><a href="#">Datenschutz</a><a href="#">AGB</a></div>
    <span class="footer-copy">Hamburg &middot; byrud-tech.com</span>
  </footer>

</body>
</html>
