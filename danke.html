<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vielen Dank — Byrud Tech</title>
  <meta name="format-detection" content="telephone=no" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0b0b; --bg2: #111111; --bg3: #161616;
      --accent: #e8a220; --accent-dim: #b87e18; --accent-glow: rgba(232,162,32,0.12);
      --text: #f0ede8; --text-muted: #9a9a92; --text-dim: #6a6a64;
      --border: rgba(255,255,255,0.07); --border-accent: rgba(232,162,32,0.3);
      --nav-bg: rgba(11,11,11,0.88); --card-bg: #141414; --grid-opacity: 0.5;
      --btn-text: #0b0b0b; --r: 6px; --r-sm: 4px;
    }
    body.light-theme {
      --bg: #fafaf8; --bg2: #f0f1ee; --bg3: #e8e9e5;
      --accent: #2756a8; --accent-dim: #1d4080; --accent-glow: rgba(39,86,168,0.08);
      --text: #2a2a28; --text-muted: #5a5a58; --text-dim: #8a8a88;
      --border: rgba(0,0,0,0.08); --border-accent: rgba(39,86,168,0.2);
      --nav-bg: rgba(250,250,248,0.92); --card-bg: #ffffff; --grid-opacity: 0.3;
      --btn-text: #ffffff;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; font-weight: 400; line-height: 1.6; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; z-index: 0; opacity: var(--grid-opacity); }

    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 3rem; height: 64px; background: var(--nav-bg); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
    .logo { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 1.3rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text); text-decoration: none; position: relative; padding: 5px 8px; }
    .logo-corner { position: absolute; width: 7px; height: 7px; border-color: var(--accent); border-style: solid; border-width: 0; }
    .logo-corner--tl { top: 0; left: 0; border-top-width: 1px; border-left-width: 1px; }
    .logo-corner--tr { top: 0; right: 0; border-top-width: 1px; border-right-width: 1px; }
    .logo-corner--bl { bottom: 0; left: 0; border-bottom-width: 1px; border-left-width: 1px; }
    .logo-corner--br { bottom: 0; right: 0; border-bottom-width: 1px; border-right-width: 1px; }
    .logo span { color: var(--accent); }

    .section-tag { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 1rem; }
    .btn-primary { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; background: var(--accent); color: var(--btn-text); padding: 0.9rem 2rem; text-decoration: none; font-weight: 500; transition: opacity 0.2s; border: none; cursor: pointer; }
    .btn-primary:hover { opacity: 0.85; }

    .danke-section { min-height: calc(100vh - 64px - 60px); display: flex; align-items: center; justify-content: center; text-align: center; padding: 4rem 2rem; position: relative; z-index: 1; }
    .danke-section h1 { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: clamp(2rem, 5vw, 4rem); text-transform: uppercase; line-height: 1; margin-bottom: 0; }

    footer { border-top: 1px solid var(--border); padding: 2rem 3rem; display: flex; align-items: center; justify-content: space-between; background: var(--bg); position: relative; z-index: 1; }
    .footer-copy { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; letter-spacing: 0.1em; color: var(--text-dim); }
    .footer-links { display: flex; gap: 1.5rem; }
    .footer-links a { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); text-decoration: none; transition: color 0.2s; }
    .footer-links a:hover { color: var(--accent); }

    @media (max-width: 900px) {
      nav { padding: 0 1.5rem; }
      footer { flex-direction: column; gap: 1rem; text-align: center; padding: 2rem 1.5rem; }
    }

    .nav-actions { display: flex; align-items: center; gap: 0.25rem; }

    /* THEME TOGGLE */
    .theme-toggle { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; display: flex; align-items: center; transition: color 0.3s; }
    .theme-toggle:hover { color: var(--accent); }
    body.light-theme .theme-icon-sun { display: none; }
    body.light-theme .theme-icon-moon { display: block !important; }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">
      <span class="logo-corner logo-corner--tl"></span>
      <span class="logo-corner logo-corner--tr"></span>
      <span class="logo-corner logo-corner--bl"></span>
      <span class="logo-corner logo-corner--br"></span>
      BYRUD<span>TECH</span>
    </a>
    <div class="nav-actions">
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Theme">
      <svg class="theme-icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="theme-icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    </div>
  </nav>

  <section class="danke-section">
    <div>
      <div class="section-tag">// Vielen Dank</div>
      <h1>Nachricht<br><span style="color: var(--accent);">gesendet.</span></h1>
      <p style="color: var(--text-muted); max-width: 400px; margin: 1.5rem auto 2rem; line-height: 1.75;">
        Wir haben Ihre Anfrage erhalten und melden uns innerhalb von 24 Stunden bei Ihnen.
      </p>
      <a href="index.html" class="btn-primary">&larr; Zurück zur Startseite</a>
    </div>
  </section>

  <footer>
    <span class="footer-copy">&copy; 2025 Byrud Tech. Alle Rechte vorbehalten.</span>
    <div class="footer-links"><a href="#">Impressum</a><a href="#">Datenschutz</a><a href="#">AGB</a></div>
    <span class="footer-copy">Hamburg &middot; byrud-tech.com</span>
  </footer>

<script>
    /* THEME TOGGLE */
    function toggleTheme() {
      document.body.classList.toggle('light-theme');
      var isLight = document.body.classList.contains('light-theme');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
      updateThemePhotos(isLight);
    }
    function updateThemePhotos(isLight) {
      document.querySelectorAll('[data-src-dark]').forEach(function(img) {
        if (isLight && img.dataset.srcLight) {
          img.src = img.dataset.srcLight;
        } else if (img.dataset.srcDark) {
          img.src = img.dataset.srcDark;
        }
      });
    }
    (function() {
      var isLight = localStorage.getItem('theme') === 'light';
      if (isLight) {
        document.body.classList.add('light-theme');
        updateThemePhotos(true);
      }
    })();
  </script>

</body>
</html>
